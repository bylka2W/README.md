name: Update Stats

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BG: 0d1117
  RADIUS: 20
  GRAPH_RADIUS: 16
  RX: 20

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats
        run: |
          HOUR=$(date +%H)
          case $((HOUR % 8)) in
            0) TITLE=e06c75; TEXT=be9196; ICON=d19a9e; BORDER=8b4545;;
            1) TITLE=d19a66; TEXT=c4a882; ICON=cc9966; BORDER=8b6914;;
            2) TITLE=e5c07b; TEXT=c4b998; ICON=d4c088; BORDER=8b7d3c;;
            3) TITLE=98c379; TEXT=a3b89a; ICON=9db88a; BORDER=4a6b3c;;
            4) TITLE=7ec8cc; TEXT=9ab8ba; ICON=8cc0c2; BORDER=3c6b6e;;
            5) TITLE=56b6c2; TEXT=8ab8be; ICON=6fbcc4; BORDER=3c6b6e;;
            6) TITLE=c678dd; TEXT=ae9abe; ICON=b890d0; BORDER=6b3c8b;;
            7) R=$((RANDOM%56+180)); G=$((RANDOM%56+180)); B=$((RANDOM%56+180))
               TITLE=$(printf '%02x%02x%02x' $R $G $B)
               R=$((RANDOM%56+140)); G=$((RANDOM%56+140)); B=$((RANDOM%56+140))
               TEXT=$(printf '%02x%02x%02x' $R $G $B)
               ICON=$TEXT
               BORDER=$TITLE;;
          esac
          curl -o stats.svg "https://github-readme-stats-eight-theta.vercel.app/api?username=bylka2W&show_icons=true&bg_color=${{ env.BG }}&title_color=$TITLE&text_color=$TEXT&icon_color=$ICON&border_color=$BORDER&_=${{ github.run_id }}"
          curl -o streak.svg "https://streak-stats.demolab.com/?user=bylka2W&background=${{ env.BG }}&ring=$TITLE&fire=$TITLE&currStreakLabel=$TITLE&currStreakNum=$TITLE&sideNums=$TEXT&sideLabels=$TEXT&dates=$TEXT&border=$BORDER&stroke=$BORDER&border_radius=${{ env.RADIUS }}&_=${{ github.run_id }}"
          curl -o graph.svg "https://github-readme-activity-graph.vercel.app/graph?username=bylka2W&bg_color=${{ env.BG }}&color=$TEXT&line=$TITLE&point=$TITLE&area_color=1b4332&area=true&hide_border=false&border_color=$BORDER&radius=${{ env.GRAPH_RADIUS }}&_=${{ github.run_id }}"
          curl -o pin1.svg "https://github-readme-stats-eight-theta.vercel.app/api/pin/?username=bylka2W&repo=B-Plus&show_owner=true&bg_color=${{ env.BG }}&title_color=$TITLE&text_color=$TEXT&icon_color=$ICON&border_color=$BORDER&_=${{ github.run_id }}"
          curl -o pin2.svg "https://github-readme-stats-eight-theta.vercel.app/api/pin/?username=bylka2W&repo=TSS&show_owner=true&bg_color=${{ env.BG }}&title_color=$TITLE&text_color=$TEXT&icon_color=$ICON&border_color=$BORDER&_=${{ github.run_id }}"
          sed -i "s/rx=\"[^\"]*\"/rx=\"${{ env.RX }}\"/g" stats.svg pin1.svg pin2.svg graph.svg
          sed -i "s/stroke=\"#[^\"]*\"/stroke=\"#$BORDER\"/g" stats.svg pin1.svg pin2.svg graph.svg

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add stats.svg streak.svg graph.svg pin1.svg pin2.svg
          git diff --staged --quiet || git commit -m "Update stats"
          git push

      - name: Push to GitVerse
        run: |
          git remote add gitverse https://${{ secrets.GITVERSE_USER }}:${{ secrets.GITVERSE_TOKEN }}@gitverse.ru/bylka2W/bylka2W.git
          git push gitverse main --force