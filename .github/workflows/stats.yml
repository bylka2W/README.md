name: Update Stats

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BG: 0d1117
  TITLE: b366ff
  TEXT: c792ea
  ICON: a855f7
  BORDER: 7c3aed
  RADIUS: 20
  GRAPH_RADIUS: 16
  RX: 20

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate stats
        run: |
          curl -o stats.svg "https://github-readme-stats-eight-theta.vercel.app/api?username=bylka2W&show_icons=true&bg_color=${{ env.BG }}&title_color=${{ env.TITLE }}&text_color=${{ env.TEXT }}&icon_color=${{ env.ICON }}&border_color=${{ env.BORDER }}&_=${{ github.run_id }}"
          curl -o streak.svg "https://github-readme-streak-stats.herokuapp.com/?user=bylka2W&background=${{ env.BG }}&ring=${{ env.TITLE }}&fire=${{ env.TITLE }}&currStreakLabel=${{ env.TITLE }}&currStreakNum=${{ env.TITLE }}&sideNums=${{ env.TEXT }}&sideLabels=${{ env.TEXT }}&dates=${{ env.TEXT }}&border=${{ env.BORDER }}&stroke=${{ env.BORDER }}&border_radius=${{ env.RADIUS }}&_=${{ github.run_id }}"
          curl -o graph.svg "https://github-readme-activity-graph.vercel.app/graph?username=bylka2W&bg_color=${{ env.BG }}&color=${{ env.TEXT }}&line=${{ env.TITLE }}&point=${{ env.TITLE }}&area_color=1b4332&area=true&hide_border=false&border_color=${{ env.BORDER }}&radius=${{ env.GRAPH_RADIUS }}&_=${{ github.run_id }}"
          curl -o pin1.svg "https://github-readme-stats-eight-theta.vercel.app/api/pin/?username=bylka2W&repo=B-Plus&show_owner=true&bg_color=${{ env.BG }}&title_color=${{ env.TITLE }}&text_color=${{ env.TEXT }}&icon_color=${{ env.ICON }}&border_color=${{ env.BORDER }}&_=${{ github.run_id }}"
          curl -o pin2.svg "https://github-readme-stats-eight-theta.vercel.app/api/pin/?username=bylka2W&repo=TSS&show_owner=true&bg_color=${{ env.BG }}&title_color=${{ env.TITLE }}&text_color=${{ env.TEXT }}&icon_color=${{ env.ICON }}&border_color=${{ env.BORDER }}&_=${{ github.run_id }}"
          sed -i "s/rx=\"[^\"]*\"/rx=\"${{ env.RX }}\"/g" stats.svg pin1.svg pin2.svg graph.svg
          sed -i "s/stroke=\"#[^\"]*\"/stroke=\"#${{ env.BORDER }}\"/g" stats.svg pin1.svg pin2.svg graph.svg

      - name: Commit main
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add stats.svg streak.svg graph.svg pin1.svg pin2.svg
          git diff --staged --quiet || git commit -m "Update stats"
          git push origin main

      - name: Push to GitVerse
        run: |
          git remote add gitverse https://${{ secrets.GITVERSE_USER }}:${{ secrets.GITVERSE_TOKEN }}@gitverse.ru/bylka2W/bylka2W.git
          git push gitverse main --force